<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object - AutoDex</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html">AutoDex</a>
    <div class="nav-links">
      <a href="index.html">Overview</a>
      <a href="gallery.html" class="cta">Gallery</a>
      <a href="experiments.html">Experiments</a>
    </div>
  </nav>

  <main class="container">
    <a class="back-link" href="gallery.html">&larr; Gallery</a>
    <div class="object-layout">
      <aside>
        <section class="object-summary" id="object-summary">
          <div class="thumb-slot"></div>
          <div class="object-summary-body">
            <h1>Loading</h1>
            <div class="sub">-</div>
          </div>
        </section>
        <section class="asset-panel">
          <h2>3D Asset</h2>
          <div class="model-shell" id="asset-viewer">
            <div class="asset-empty">Pending upload</div>
          </div>
        </section>
      </aside>

      <section>
        <div class="tabs" id="hand-tabs"></div>
        <div class="controls">
          <select class="obj-select" id="obj-select"></select>
          <div class="view-toggle">
            <button class="view-btn active" data-view="gallery">Candidates</button>
            <button class="view-btn" data-view="experiments">Experiments</button>
          </div>
          <span class="grasp-count" id="grasp-count"></span>
        </div>
        <div id="content"><div class="loading">Loading</div></div>
      </section>
    </div>
  </main>

  <script>
    const HF_BASE = 'https://huggingface.co/datasets/willi19/autodex-gallery/resolve/main';
    const params = new URLSearchParams(location.search);

    let catalog = [];
    let assets = {objects: {}};
    let currentObj = params.get('obj') || null;
    let currentHand = params.get('hand') || 'allegro';
    let currentView = params.get('view') || 'gallery';
    let experiments = {};

    Promise.all([
      fetch('catalog.json').then(r => r.json()),
      fetch('experiments.json').then(r => r.json()).catch(() => ({})),
      fetch('assets3d.json').then(r => r.json()).catch(() => ({objects: {}}))
    ]).then(([cat, exp, assetManifest]) => {
      catalog = cat;
      experiments = exp;
      assets = assetManifest || {objects: {}};
      if (!currentObj && catalog.length > 0) currentObj = catalog[0].id;
      if (!getObjData()?.hands[currentHand]) {
        currentHand = getObjData()?.hands.allegro ? 'allegro' : 'inspire';
      }
      initUI();
      render();
    });

    function assetEntry(id) {
      return (assets.objects || {})[id] || null;
    }

    function assetUrl(id) {
      const item = assetEntry(id);
      if (!item) return '';
      if (item.url) return item.url;
      const rel = item.glb || item.gltf || '';
      if (!rel) return '';
      const base = assets.base_url || '';
      return base ? `${base.replace(/\/$/, '')}/${rel.replace(/^\//, '')}` : rel;
    }

    function initUI() {
      renderHandTabs();
      const select = document.getElementById('obj-select');
      select.addEventListener('change', e => {
        currentObj = e.target.value;
        if (!getObjData()?.hands[currentHand]) {
          currentHand = getObjData()?.hands.allegro ? 'allegro' : 'inspire';
        }
        updateURL();
        initUI();
        render();
      });

      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === currentView);
        btn.addEventListener('click', () => {
          currentView = btn.dataset.view;
          updateURL();
          render();
        });
      });
    }

    function renderHandTabs() {
      const hands = ['allegro', 'inspire'];
      const tabsEl = document.getElementById('hand-tabs');
      tabsEl.innerHTML = hands.map(h => {
        const count = catalog.filter(o => o.hands[h]).length;
        return `<button class="tab ${h === currentHand ? 'active' : ''}" data-hand="${h}">${labelHand(h)} (${count})</button>`;
      }).join('');
      tabsEl.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          currentHand = btn.dataset.hand;
          const objs = catalog.filter(o => o.hands[currentHand]);
          if (!objs.find(o => o.id === currentObj)) currentObj = objs[0]?.id;
          updateURL();
          initUI();
          render();
        });
      });

      const select = document.getElementById('obj-select');
      const objs = catalog.filter(o => o.hands[currentHand]);
      select.innerHTML = objs.map(o =>
        `<option value="${o.id}" ${o.id === currentObj ? 'selected' : ''}>${o.name}</option>`
      ).join('');
    }

    function labelHand(hand) {
      return hand.charAt(0).toUpperCase() + hand.slice(1);
    }

    function updateURL() {
      const p = new URLSearchParams();
      if (currentObj) p.set('obj', currentObj);
      p.set('hand', currentHand);
      p.set('view', currentView);
      history.replaceState(null, '', `object.html?${p}`);
      document.title = `${getObjData()?.name || 'Object'} - AutoDex`;
    }

    function getObjData() {
      return catalog.find(o => o.id === currentObj);
    }

    function getExpData(graspIdx) {
      const handExp = experiments[currentHand];
      if (!handExp) return null;
      const objExp = handExp[currentObj];
      if (!objExp) return null;
      return objExp[String(graspIdx)] || null;
    }

    function renderSummary(obj, count, nSuccess, nFail, nUntested) {
      const thumbSrc = obj.has_thumbnail
        ? `objects/${obj.id}/thumb.png?v=24`
        : `https://via.placeholder.com/320/f5f0e9/8a8178?text=${encodeURIComponent(obj.name)}`;
      document.getElementById('object-summary').innerHTML = `
        <img src="${thumbSrc}" alt="${obj.name}">
        <div class="object-summary-body">
          <h1>${obj.name}</h1>
          <div class="sub">${labelHand(currentHand)} · ${count} candidates</div>
          <div class="hands-info" style="padding:12px 0 0">
            <span class="chip ok">${nSuccess} success</span>
            <span class="chip warn">${nFail} failed</span>
            <span class="chip">${nUntested} untested</span>
          </div>
        </div>`;

      const url = assetUrl(obj.id);
      const viewer = document.getElementById('asset-viewer');
      if (url) {
        viewer.innerHTML = `<model-viewer src="${url}" camera-controls auto-rotate shadow-intensity="0.6" exposure="0.9" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>`;
      } else {
        viewer.innerHTML = '<div class="asset-empty">3D asset not uploaded yet</div>';
      }
    }

    function render() {
      const obj = getObjData();
      if (!obj) {
        document.getElementById('content').innerHTML = '<div class="empty-state">Object not found</div>';
        return;
      }

      const count = obj.hands[currentHand] || 0;
      let nSuccess = 0, nFail = 0, nUntested = 0;
      for (let i = 0; i < count; i++) {
        const exp = getExpData(i);
        if (!exp) nUntested++;
        else if (exp.status === 'success') nSuccess++;
        else nFail++;
      }
      renderSummary(obj, count, nSuccess, nFail, nUntested);
      document.getElementById('grasp-count').innerHTML =
        `<span class="stat"><span class="stat-dot success"></span>${nSuccess}</span>` +
        `<span class="stat"><span class="stat-dot fail"></span>${nFail}</span>` +
        `<span class="stat"><span class="stat-dot untested"></span>${nUntested}</span>` +
        `<span>/ ${count} total</span>`;

      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === currentView);
      });

      if (currentView === 'gallery') renderGallery(obj, count);
      else renderExperiments(obj, count);
    }

    function renderGallery(obj, count) {
      const content = document.getElementById('content');
      let html = '<div class="grasp-grid">';
      for (let i = 0; i < count; i++) {
        const rank = String(i).padStart(3, '0');
        const videoUrl = `${HF_BASE}/turntable/${currentHand}/${currentObj}/${rank}/turntable.mp4`;
        const exp = getExpData(i);
        let badgeHtml = '<span class="badge badge-untested">Untested</span>';
        if (exp) {
          badgeHtml = exp.status === 'success'
            ? '<span class="badge badge-success">Success</span>'
            : '<span class="badge badge-fail">Failed</span>';
        }
        html += `
          <article class="grasp-card" data-idx="${i}">
            <video data-src="${videoUrl}" preload="none" loop muted playsinline autoplay></video>
            <div class="card-footer">
              <span class="badge badge-rank">#${i + 1}</span>
              <span>
                ${badgeHtml}
                <button class="dl-btn" title="Download" onclick="event.stopPropagation();downloadVideo('${videoUrl}','${currentObj}_${currentHand}_${rank}.mp4')">&#x2B07;</button>
              </span>
            </div>
          </article>`;
      }
      html += '</div>';
      content.innerHTML = html;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const video = entry.target.querySelector('video');
            if (video && video.dataset.src && !video.src) {
              video.src = video.dataset.src;
              video.load();
              video.play().catch(() => {});
            }
            observer.unobserve(entry.target);
          }
        });
      }, { rootMargin: '220px' });
      content.querySelectorAll('.grasp-card').forEach(card => observer.observe(card));

      content.querySelectorAll('.grasp-card').forEach(card => {
        card.addEventListener('click', () => {
          currentView = 'experiments';
          updateURL();
          render();
          setTimeout(() => {
            const el = document.getElementById(`exp-${card.dataset.idx}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        });
      });
    }

    function renderExperiments(obj, count) {
      const content = document.getElementById('content');
      const expGrasps = [];
      for (let i = 0; i < count; i++) {
        const exp = getExpData(i);
        if (exp) expGrasps.push({ idx: i, exp });
      }

      if (!expGrasps.length) {
        content.innerHTML = `
          <div class="empty-state">
            <h2>No experiments yet</h2>
            <p>${obj.name} ${labelHand(currentHand)} trials will appear here once uploaded.</p>
          </div>`;
        return;
      }

      let html = '<div class="exp-list">';
      for (const { idx, exp } of expGrasps) {
        const rank = String(idx).padStart(3, '0');
        const turntableUrl = `${HF_BASE}/turntable/${currentHand}/${currentObj}/${rank}/turntable.mp4`;
        const statusBadge = exp.status === 'success'
          ? '<span class="badge badge-success">Success</span>'
          : '<span class="badge badge-fail">Failed</span>';
        const cameras = exp.cameras || [];
        const hasMerged = exp.merged !== false;
        let camOptions = '';
        if (hasMerged) camOptions += '<option value="merged">Merged</option>';
        cameras.forEach(s => { camOptions += `<option value="${s}">${s}</option>`; });
        const defaultCam = hasMerged ? 'merged' : (cameras[0] || '');
        const expVideoUrl = defaultCam
          ? `${HF_BASE}/experiments/${currentHand}/${currentObj}/${rank}/${defaultCam}.mp4`
          : '';

        html += `
          <section class="exp-row" id="exp-${idx}">
            <div class="exp-row-header">
              <h3>Candidate #${idx + 1} ${statusBadge}</h3>
              <span>
                ${cameras.length > 0 || hasMerged ? `
                  <select class="cam-select" data-idx="${idx}" onchange="switchCam(this)">
                    ${camOptions}
                  </select>` : ''}
                <a href="detail.html?hand=${currentHand}&obj=${currentObj}&rank=${idx}" style="margin-left:8px;font-size:.86em;font-weight:700;">Detail &rarr;</a>
              </span>
            </div>
            <div class="exp-videos">
              <div class="exp-video-cell">
                <div class="cell-label">Turntable</div>
                <video src="${turntableUrl}" controls preload="metadata" loop muted playsinline autoplay></video>
              </div>
              <div class="exp-video-cell">
                <div class="cell-label">Experiment</div>
                <video id="exp-video-${idx}" src="${expVideoUrl}" controls preload="metadata" loop muted playsinline autoplay
                       ${!expVideoUrl ? 'style="display:none"' : ''}></video>
                ${!expVideoUrl ? '<div class="empty-state" style="padding:20px">No video available</div>' : ''}
              </div>
            </div>
          </section>`;
      }
      html += '</div>';
      content.innerHTML = html;
    }

    function downloadVideo(url, filename) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function switchCam(select) {
      const idx = select.dataset.idx;
      const cam = select.value;
      const rank = String(idx).padStart(3, '0');
      const url = `${HF_BASE}/experiments/${currentHand}/${currentObj}/${rank}/${cam}.mp4`;
      const video = document.getElementById(`exp-video-${idx}`);
      if (video) {
        video.src = url;
        video.style.display = '';
        video.load();
      }
    }
  </script>
</body>
</html>
