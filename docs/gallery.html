<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dataset Gallery - AutoDex</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    .viewer-container {
      max-width: 1500px;
      padding-top: 18px;
    }

    .gallery-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 18px;
      margin-bottom: 14px;
    }

    .gallery-kicker {
      color: var(--accent-hover);
      font-size: .78em;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .gallery-title {
      margin-top: 4px;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .summary-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .explorer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .control-deck,
    .viewer-main {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
    }

    .control-deck {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(140px, .85fr) minmax(150px, .85fr) minmax(220px, 1.15fr);
      gap: 14px;
      padding: 12px 14px;
      align-items: start;
    }

    .field > label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: .72em;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field select {
      min-height: 38px;
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .field select:focus {
      border-color: var(--accent);
    }

    .check-group {
      display: flex;
      min-height: 38px;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0;
    }

    .check-chip {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: .76em;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }

    .check-chip:has(input:checked) {
      border-color: rgba(226, 96, 59, .48);
      background: rgba(226, 96, 59, .12);
      color: var(--text);
    }

    .check-chip:focus-within {
      border-color: var(--accent);
    }

    .check-chip input {
      width: 13px;
      height: 13px;
      margin: 0;
      accent-color: var(--accent);
    }

    .empty-check {
      padding: 0 5px;
      color: var(--text-muted);
      font-size: .76em;
      font-weight: 800;
    }

    .viewer-main {
      overflow: hidden;
    }

    .viewer-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .selected-title {
      min-width: 0;
    }

    .selected-title h2 {
      font-size: 1.08em;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selected-title .sub {
      margin-top: 2px;
      color: var(--text-muted);
      font-size: .82em;
    }

    .screen-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      width: 100%;
      aspect-ratio: 8 / 3;
      padding: 10px;
      background: #171613;
    }

    .media-panel {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(216, 221, 210, .34);
      border-radius: var(--radius);
      background: #080808;
    }

    .media-panel-label {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 4;
      padding: 5px 8px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 6px;
      background: rgba(12, 12, 12, .58);
      color: rgba(255, 255, 255, .86);
      font-size: .72em;
      font-weight: 850;
      letter-spacing: .04em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .screen-wrap video,
    .interactive-3d-viewer,
    .screen-placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .screen-wrap video {
      display: block;
      object-fit: contain;
      background: #080808;
    }

    .interactive-3d-viewer {
      display: none;
      background: #f7f8f4;
      overflow: hidden;
    }

    .interactive-3d-canvas {
      position: absolute;
      inset: 0;
    }

    .interactive-3d-canvas canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .interactive-3d-status {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      max-width: min(460px, calc(100% - 24px));
      padding: 8px 10px;
      border: 1px solid rgba(216, 221, 210, .88);
      border-radius: 6px;
      background: rgba(255, 255, 255, .82);
      color: var(--text-muted);
      font-size: .78em;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    .interactive-3d-controls {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 3;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(216, 221, 210, .9);
      border-radius: 7px;
      background: rgba(255, 255, 255, .86);
      backdrop-filter: blur(8px);
    }

    .interactive-3d-controls button,
    .interactive-3d-controls select {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: .78em;
      font-weight: 850;
    }

    .interactive-3d-controls button {
      min-width: 70px;
      padding: 0 10px;
    }

    .interactive-3d-controls input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .interactive-3d-readout {
      min-width: 86px;
      color: var(--text-muted);
      font-size: .76em;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .screen-placeholder {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: rgba(255, 255, 255, .82);
      text-align: center;
      background:
        linear-gradient(135deg, rgba(226, 96, 59, .16), rgba(20, 20, 20, .2)),
        #111;
    }

    .screen-placeholder.visible {
      display: flex;
    }

    .placeholder-box {
      width: min(460px, 100%);
    }

    .placeholder-box h3 {
      margin-bottom: 8px;
      color: #fff;
      font-size: 1.02em;
    }

    .placeholder-box p {
      color: rgba(255, 255, 255, .72);
      font-size: .9em;
      line-height: 1.45;
    }

    .playback-rail {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 54px;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      color: rgba(255, 255, 255, .68);
      font-size: .78em;
      font-weight: 800;
    }

    .playback-rail input {
      width: 100%;
      accent-color: var(--accent);
    }

    .selector-stack {
      --selector-row-height: 39px;
      --selector-rail-height: 176px;
      --selector-row-shift: calc(var(--selector-rail-height) - 1px);
      position: relative;
      z-index: 5;
      height: calc(var(--selector-row-height) * 3);
      overflow: visible;
      background: #fcfbf9;
      border-top: 1px solid var(--line);
    }

    .selector-row {
      position: relative;
      border-bottom: 1px solid var(--line);
      background: #fcfbf9;
      z-index: 1;
      transition: transform .16s ease;
    }

    .selector-row.open {
      z-index: 20;
    }

    #object-selector.open ~ #pose-selector,
    #object-selector.open ~ #view-selector,
    #pose-selector.open ~ #view-selector {
      z-index: 25;
      transform: translateY(var(--selector-row-shift));
    }

    .selector-row-header {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto 18px;
      gap: 8px;
      align-items: center;
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 0;
      background: transparent;
      text-align: left;
    }

    .selector-row-header:hover {
      background: #f6f1eb;
    }

    .selector-row-label {
      color: var(--text);
      font-size: .8em;
      font-weight: 850;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    .selector-row-value {
      min-width: 0;
      color: var(--text-muted);
      font-size: .82em;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selector-row-count {
      color: var(--text-muted);
      font-size: .74em;
      font-weight: 800;
      white-space: nowrap;
    }

    .selector-chevron {
      color: var(--text-muted);
      font-size: 1.2em;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      transition: transform .16s;
    }

    .selector-row.open .selector-chevron {
      transform: rotate(90deg);
    }

    .selector-rail {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 30;
      box-sizing: border-box;
      display: flex;
      gap: 8px;
      height: 0;
      min-width: 0;
      max-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      padding: 0 10px 0 90px;
      border-top: 0 solid var(--line);
      border-bottom: 0 solid var(--line);
      background: #fcfbf9;
      box-shadow: 0 18px 34px rgba(42, 34, 28, .16);
      opacity: 0;
      pointer-events: none;
      scroll-behavior: auto;
      scrollbar-width: thin;
      touch-action: pan-x;
      transition: height .16s ease, max-height .16s ease, padding-top .16s ease, padding-bottom .16s ease, border-top-width .16s ease, border-bottom-width .16s ease, opacity .12s ease;
      visibility: hidden;
    }

    .selector-row.open .selector-rail {
      height: var(--selector-rail-height);
      max-height: var(--selector-rail-height);
      padding-top: 8px;
      padding-bottom: 10px;
      border-top-width: 1px;
      border-bottom-width: 1px;
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .object-tile,
    .pose-tile,
    .view-tile {
      flex: 0 0 178px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: left;
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }

    .object-tile:hover,
    .pose-tile:hover,
    .view-tile:hover,
    .object-tile.active,
    .pose-tile.active,
    .view-tile.active {
      border-color: var(--accent);
      box-shadow: var(--shadow-lift);
      transform: translateY(-1px);
    }

    .pose-tile {
      flex-basis: 210px;
    }

    .object-tile img,
    .pose-tile video,
    .view-tile img,
    .tile-preview {
      width: 100%;
      height: 108px;
      display: block;
      background: var(--surface-2);
      object-fit: cover;
      pointer-events: none;
    }

    .tile-preview {
      display: grid;
      place-items: center;
      padding: 10px;
      background: #efe8de;
      color: var(--text);
      font-size: .82em;
      font-weight: 850;
      text-align: center;
    }

    .view-preview {
      background: #e9edf0;
    }

    .tile-preview span {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .object-tile img {
      height: 108px;
      padding: 6px;
      background: var(--bg);
      object-fit: contain;
    }

    .tile-body {
      padding: 7px 8px 8px;
      pointer-events: none;
    }

    .tile-title {
      font-size: .82em;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile-sub {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: .7em;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selector-stack .tile-sub,
    .selector-stack .status-line {
      display: none;
    }

    .status-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .empty-inline {
      padding: 24px;
      color: var(--text-muted);
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
    }

    @media (max-width: 1180px) {
      .control-deck {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .explorer-layout {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 760px) {
      .viewer-container {
        padding-left: 14px;
        padding-right: 14px;
      }

      .gallery-head,
      .control-deck {
        grid-template-columns: 1fr;
      }

      .summary-pills {
        justify-content: flex-start;
      }

      .viewer-topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .screen-wrap {
        grid-template-columns: 1fr;
        aspect-ratio: auto;
      }

      .media-panel {
        aspect-ratio: 4 / 3;
      }

      .selector-row-header {
        grid-template-columns: 64px minmax(0, 1fr) auto 18px;
      }

      .selector-rail {
        padding-left: 10px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html">AutoDex</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gallery.html" class="cta">Gallery</a>
      <a href="experiments.html">Experiments</a>
    </div>
  </nav>

  <main class="container viewer-container">
    <header class="gallery-head">
      <div>
        <div class="gallery-kicker">Dataset Gallery</div>
        <h1 class="gallery-title">Episode Viewer</h1>
      </div>
      <div class="summary-pills" id="summary-pills"></div>
    </header>

    <section class="control-deck" aria-label="Gallery controls">
      <div class="field">
        <label id="hand-filter-label">Hand</label>
        <div class="check-group" id="hand-filter" role="group" aria-labelledby="hand-filter-label"></div>
      </div>
      <div class="field">
        <label id="status-filter-label">Outcome</label>
        <div class="check-group" id="status-filter" role="group" aria-labelledby="status-filter-label"></div>
      </div>
      <div class="field">
        <label id="scene-filter-label">Scene</label>
        <div class="check-group" id="scene-filter" role="group" aria-labelledby="scene-filter-label"></div>
      </div>
    </section>

    <section class="explorer-layout">
      <section class="viewer-main" aria-label="Main episode panel">
        <div class="viewer-topbar">
          <div class="selected-title">
            <h2 id="selected-title">Loading...</h2>
            <div class="sub" id="selected-subtitle"></div>
          </div>
        </div>

        <div class="selector-stack" aria-label="Thumbnail selectors">
          <section class="selector-row" id="object-selector" data-selector="object">
            <button class="selector-row-header" id="object-header" type="button" aria-expanded="false" aria-controls="object-strip">
              <span class="selector-row-label">Object</span>
              <span class="selector-row-value" id="object-value">-</span>
              <span class="selector-row-count" id="object-count"></span>
              <span class="selector-chevron">&rsaquo;</span>
            </button>
            <div class="selector-rail object-strip" id="object-strip"></div>
          </section>

          <section class="selector-row" id="pose-selector" data-selector="pose">
            <button class="selector-row-header" id="pose-header" type="button" aria-expanded="false" aria-controls="pose-strip">
              <span class="selector-row-label">Pose</span>
              <span class="selector-row-value" id="pose-value">-</span>
              <span class="selector-row-count" id="pose-count"></span>
              <span class="selector-chevron">&rsaquo;</span>
            </button>
            <div class="selector-rail pose-strip" id="pose-strip"></div>
          </section>

          <section class="selector-row" id="view-selector" data-selector="view">
            <button class="selector-row-header" id="view-header" type="button" aria-expanded="false" aria-controls="view-strip">
              <span class="selector-row-label">View</span>
              <span class="selector-row-value" id="view-value">-</span>
              <span class="selector-row-count" id="view-count"></span>
              <span class="selector-chevron">&rsaquo;</span>
            </button>
            <div class="selector-rail view-strip" id="view-strip"></div>
          </section>
        </div>

        <div class="screen-wrap">
          <section class="media-panel video-panel" aria-label="Selected camera video">
            <div class="media-panel-label">Video</div>
            <video id="main-video" controls autoplay muted loop playsinline preload="metadata"></video>
            <div class="screen-placeholder" id="video-pending-layer">
              <div class="placeholder-box">
                <h3 id="video-pending-title">Video pending</h3>
                <p id="video-pending-copy"></p>
                <div class="playback-rail">
                  <span>0:00</span>
                  <input type="range" min="0" max="100" value="0" disabled>
                  <span>0:00</span>
                </div>
              </div>
            </div>
          </section>

          <section class="media-panel three-d-panel" aria-label="Selected episode interactive 3D">
            <div class="media-panel-label">Interactive 3D</div>
            <div class="screen-placeholder" id="pending-layer">
              <div class="placeholder-box">
                <h3 id="pending-title">Asset pending</h3>
                <p id="pending-copy"></p>
                <div class="playback-rail">
                  <span>0:00</span>
                  <input type="range" min="0" max="100" value="0" disabled>
                  <span>0:00</span>
                </div>
              </div>
            </div>
            <div class="interactive-3d-viewer" id="interactive-3d-viewer">
              <div class="interactive-3d-canvas" id="interactive-3d-canvas"></div>
              <div class="interactive-3d-status" id="interactive-3d-status">Interactive 3D</div>
              <div class="interactive-3d-controls">
                <button id="interactive-3d-play" type="button">Pause</button>
                <input id="interactive-3d-scrub" type="range" min="0" max="1000" value="0">
                <div class="interactive-3d-readout" id="interactive-3d-readout">0.00s</div>
                <select id="interactive-3d-speed" aria-label="3D playback speed">
                  <option value="0.5">0.5x</option>
                  <option value="1" selected>1x</option>
                  <option value="2">2x</option>
                  <option value="4">4x</option>
                </select>
              </div>
            </div>
          </section>
        </div>
      </section>
    </section>
  </main>

  <script>
    const ORIGINAL_HF_BASE = 'https://huggingface.co/datasets/willi19/autodex-gallery/resolve/main';
    const PROXY_HF_BASE = 'https://huggingface.co/datasets/happyguma/autodex-gallery-proxy/resolve/main';
    const THREE_MODULE_URL = 'https://unpkg.com/three@0.160.0/build/three.module.js';
    const ORBIT_CONTROLS_URL = 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    const GLTF_LOADER_URL = 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    const state = {
      catalog: [],
      experiments: {},
      assets: {objects: {}},
      episodes: [],
      currentKey: null,
      currentCamera: null,
      mediaRequested: false,
      openSelector: null,
      autoScrollRail: null,
      autoScrollFrame: null,
      autoScrollVelocity: 0
    };
    const viewer3d = {
      initialized: false,
      loading: null,
      THREE: null,
      OrbitControls: null,
      GLTFLoader: null,
      renderer: null,
      scene: null,
      camera: null,
      controls: null,
      mixer: null,
      clock: null,
      model: null,
      assetRoot: null,
      duration: 0,
      playing: true,
      currentSrc: '',
      loadToken: 0,
      cameraViews: null,
      currentCameraViewsSrc: '',
      cameraViewsCache: new Map(),
      syncEventsBound: false,
      frame: null,
      resizeObserver: null
    };

    const els = {};
    [
      'summary-pills',
      'hand-filter',
      'status-filter',
      'scene-filter',
      'object-selector',
      'pose-selector',
      'view-selector',
      'object-header',
      'pose-header',
      'view-header',
      'object-value',
      'pose-value',
      'view-value',
      'selected-title',
      'selected-subtitle',
      'main-video',
      'video-pending-layer',
      'video-pending-title',
      'video-pending-copy',
      'pending-layer',
      'pending-title',
      'pending-copy',
      'interactive-3d-viewer',
      'interactive-3d-canvas',
      'interactive-3d-status',
      'interactive-3d-play',
      'interactive-3d-scrub',
      'interactive-3d-readout',
      'interactive-3d-speed',
      'object-strip',
      'object-count',
      'pose-strip',
      'pose-count',
      'view-strip',
      'view-count'
    ].forEach(id => { els[id] = document.getElementById(id); });

    Promise.all([
      fetch('catalog.json').then(r => r.json()),
      fetch('experiments.json').then(r => r.json()),
      fetch('assets3d.json?v=camera-views-v2').then(r => r.json()).catch(() => ({objects: {}}))
    ]).then(([catalog, experiments, assets]) => {
      state.catalog = catalog || [];
      state.experiments = experiments || {};
      state.assets = assets || {objects: {}};
      state.episodes = flattenEpisodes();
      fillFilters();
      renderSummary();
      selectInitialEpisode();
      applyInitialViewParams();
      bindEvents();
      renderAll();
    }).catch(err => {
      els['selected-title'].textContent = 'Gallery data failed to load';
      els['selected-subtitle'].textContent = err.message || String(err);
    });

    function bindEvents() {
      ['hand-filter', 'status-filter', 'scene-filter'].forEach(id => {
        els[id].addEventListener('change', syncAfterFilterChange);
      });

      ['object', 'pose', 'view'].forEach(name => {
        const row = els[`${name}-selector`];
        const rail = els[`${name}-strip`];
        attachRailAutoScroll(rail);
        row.addEventListener('pointerenter', () => {
          state.openSelector = name;
          updateSelectorOpenState();
        });
        row.addEventListener('pointerleave', () => {
          stopRailAutoScroll();
          state.openSelector = null;
          updateSelectorOpenState();
        });
        row.addEventListener('focusin', () => {
          state.openSelector = name;
          updateSelectorOpenState();
        });
        row.addEventListener('focusout', event => {
          requestAnimationFrame(() => {
            if (row.matches(':hover') || row.contains(document.activeElement)) return;
            stopRailAutoScroll();
            if (state.openSelector === name) {
              state.openSelector = null;
              updateSelectorOpenState();
            }
          });
        });
      });

    }

    function bindTileActivation(tile, onActivate) {
      let pointerActivated = false;

      tile.addEventListener('pointerdown', event => {
        if (event.button !== 0) return;
        pointerActivated = true;
        event.preventDefault();
        event.stopPropagation();
        stopRailAutoScroll();
        onActivate();
      });

      tile.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        if (pointerActivated) {
          pointerActivated = false;
          return;
        }
        stopRailAutoScroll();
        onActivate();
      });
    }

    function attachRailAutoScroll(rail) {
      rail.addEventListener('pointermove', event => updateRailAutoScroll(rail, event));
      rail.addEventListener('pointerleave', stopRailAutoScroll);
      rail.addEventListener('pointercancel', stopRailAutoScroll);
      rail.addEventListener('wheel', stopRailAutoScroll, {passive: true});
    }

    function updateRailAutoScroll(rail, event) {
      if (!rail || rail.scrollWidth <= rail.clientWidth) {
        stopRailAutoScroll();
        return;
      }

      const rect = rail.getBoundingClientRect();
      const edgeWidth = Math.min(120, Math.max(56, rect.width * 0.18));
      const x = event.clientX - rect.left;
      let velocity = 0;

      if (x < edgeWidth) {
        velocity = -railAutoScrollVelocity(edgeWidth - x, edgeWidth);
      } else if (x > rect.width - edgeWidth) {
        velocity = railAutoScrollVelocity(x - (rect.width - edgeWidth), edgeWidth);
      }

      if (!velocity) {
        stopRailAutoScroll();
        return;
      }

      startRailAutoScroll(rail, velocity);
    }

    function railAutoScrollVelocity(distanceIntoEdge, edgeWidth) {
      const ratio = Math.max(0, Math.min(1, distanceIntoEdge / edgeWidth));
      return 5 + Math.round(ratio * 18);
    }

    function startRailAutoScroll(rail, velocity) {
      state.autoScrollRail = rail;
      state.autoScrollVelocity = velocity;
      if (state.autoScrollFrame) return;

      const step = () => {
        const activeRail = state.autoScrollRail;
        const activeVelocity = state.autoScrollVelocity;
        if (!activeRail || !activeVelocity) {
          state.autoScrollFrame = null;
          return;
        }

        activeRail.scrollLeft += activeVelocity;
        const maxScroll = Math.max(0, activeRail.scrollWidth - activeRail.clientWidth);
        if ((activeRail.scrollLeft <= 0 && activeVelocity < 0) ||
            (activeRail.scrollLeft >= maxScroll && activeVelocity > 0)) {
          stopRailAutoScroll();
          return;
        }

        state.autoScrollFrame = requestAnimationFrame(step);
      };

      state.autoScrollFrame = requestAnimationFrame(step);
    }

    function stopRailAutoScroll() {
      state.autoScrollRail = null;
      state.autoScrollVelocity = 0;
      if (state.autoScrollFrame) {
        cancelAnimationFrame(state.autoScrollFrame);
        state.autoScrollFrame = null;
      }
    }

    function applyInitialViewParams() {
      const params = new URLSearchParams(location.search);
      const open = (params.get('selector') || params.get('open') || '').toLowerCase();
      if (['object', 'pose', 'view'].includes(open)) {
        state.openSelector = open;
      }
      const requestedObject = params.get('object');
      const requestedHand = params.get('hand') || params.get('embodiment');
      const requestedRank = params.get('rank') || params.get('pose') || params.get('episode');
      const requestedCamera = params.get('camera') || params.get('view');
      if (requestedObject || requestedHand || requestedRank) {
        const target = state.episodes.find(ep =>
          (!requestedObject || ep.objId === requestedObject) &&
          (!requestedHand || ep.hand === requestedHand) &&
          (!requestedRank || ep.rank === requestedRank || ep.rankStr === padRank(requestedRank))
        );
        if (target) {
          state.currentKey = target.key;
          state.currentCamera = requestedCamera && target.cameras.includes(requestedCamera)
            ? requestedCamera
            : target.cameras[0] || null;
          state.mediaRequested = true;
        }
      }
    }

    function flattenEpisodes() {
      const byId = new Map(state.catalog.map(obj => [obj.id, obj]));
      const episodes = [];
      Object.entries(state.experiments).forEach(([hand, objects]) => {
        Object.entries(objects || {}).forEach(([objId, grasps]) => {
          const obj = byId.get(objId) || {id: objId, name: titleize(objId), hands: {}, has_thumbnail: false};
          Object.entries(grasps || {}).forEach(([rank, exp]) => {
            const sceneInfo = Array.isArray(exp.scene_info) ? exp.scene_info : [];
            const cameras = Array.isArray(exp.cameras) ? exp.cameras : [];
            episodes.push({
              key: [hand, objId, rank].join('|'),
              hand,
              objId,
              objName: obj.name || titleize(objId),
              hasThumbnail: Boolean(obj.has_thumbnail),
              rank,
              rankLabel: `Grasp #${Number(rank) + 1}`,
              rankStr: padRank(rank),
              status: exp.status || 'unknown',
              scene: sceneInfo[0] || 'unknown',
              sceneInfo,
              dirIdx: exp.dir_idx || '',
              nTrials: exp.n_trials,
              nSuccess: exp.n_success,
              cameras,
              merged: exp.merged !== false,
              raw: exp
            });
          });
        });
      });
      return episodes.sort((a, b) =>
        a.objName.localeCompare(b.objName) ||
        a.hand.localeCompare(b.hand) ||
        Number(a.rank) - Number(b.rank)
      );
    }

    function fillFilters() {
      const hands = orderedValues(state.episodes.map(ep => ep.hand), ['allegro', 'inspire']);
      const statuses = orderedValues(state.episodes.map(ep => ep.status), ['success', 'fail']);
      const scenes = orderedValues(state.episodes.map(ep => ep.scene));
      renderCheckboxGroup('hand-filter', 'hand', hands);
      renderCheckboxGroup('status-filter', 'status', statuses);
      renderCheckboxGroup('scene-filter', 'scene', scenes);
    }

    function orderedValues(values, preferred = []) {
      const set = new Set(values.filter(Boolean));
      return [
        ...preferred.filter(value => set.delete(value)),
        ...[...set].sort((a, b) => titleize(a).localeCompare(titleize(b)))
      ];
    }

    function renderCheckboxGroup(id, name, values) {
      els[id].innerHTML = values.map(value =>
        `<label class="check-chip">
          <input type="checkbox" name="${escapeHtml(name)}" value="${escapeHtml(value)}" checked>
          <span>${escapeHtml(titleize(value))}</span>
        </label>`
      ).join('') || '<span class="empty-check">No options</span>';
    }

    function renderSummary() {
      const successes = state.episodes.filter(ep => ep.status === 'success').length;
      const fails = state.episodes.filter(ep => ep.status === 'fail').length;
      const objects = new Set(state.episodes.map(ep => ep.objId)).size;
      const cameraCounts = new Set(state.episodes.map(ep => ep.cameras.length));
      els['summary-pills'].innerHTML = [
        `<span class="chip accent">${state.episodes.length.toLocaleString()} episodes</span>`,
        `<span class="chip">${objects} objects</span>`,
        `<span class="chip ok">${successes} success</span>`,
        `<span class="chip warn">${fails} fail</span>`,
        `<span class="chip">${[...cameraCounts].sort((a, b) => a - b).join('/')} views</span>`
      ].join('');
    }

    function selectInitialEpisode() {
      const first = defaultEpisodeFrom(state.episodes);
      if (first) {
        state.currentKey = first.key;
        state.currentCamera = first.cameras[0] || null;
        state.mediaRequested = Boolean(state.currentCamera);
      }
    }

    function syncAfterFilterChange() {
      renderAll();
    }

    function filters() {
      return {
        hands: checkedValues('hand-filter'),
        statuses: checkedValues('status-filter'),
        scenes: checkedValues('scene-filter')
      };
    }

    function checkedValues(id) {
      return new Set([...els[id].querySelectorAll('input[type="checkbox"]:checked')].map(input => input.value));
    }

    function filteredEpisodes() {
      const f = filters();
      return state.episodes.filter(ep =>
        f.hands.has(ep.hand) &&
        f.statuses.has(ep.status) &&
        f.scenes.has(ep.scene)
      );
    }

    function renderAll() {
      ensureCurrentEpisodeSelection();
      renderMainPanel();
      renderSelectorRows();
    }

    function ensureCurrentEpisodeSelection() {
      const visible = filteredEpisodes();
      if (!visible.length) {
        state.currentKey = null;
        state.currentCamera = null;
        state.mediaRequested = false;
        return;
      }

      const current = visible.find(ep => ep.key === state.currentKey);
      if (!current) {
        const next = defaultEpisodeFrom(visible);
        state.currentKey = next.key;
        state.currentCamera = next.cameras[0] || null;
        state.mediaRequested = Boolean(state.currentCamera);
        return;
      }

      if (!state.currentCamera || !current.cameras.includes(state.currentCamera)) {
        state.currentCamera = current.cameras[0] || null;
      }
      state.mediaRequested = Boolean(state.currentCamera);
    }

    function defaultEpisodeFrom(episodes) {
      return episodes.find(ep => ep.status === 'success') || episodes[0] || null;
    }

    function currentEpisode() {
      return state.episodes.find(ep => ep.key === state.currentKey) || null;
    }

    function renderMainPanel() {
      const ep = currentEpisode();
      if (!ep) {
        els['selected-title'].textContent = 'No matching episode';
        els['selected-subtitle'].textContent = '';
        clearMedia();
        return;
      }

      if (!state.currentCamera || !ep.cameras.includes(state.currentCamera)) {
        state.currentCamera = ep.cameras[0] || null;
      }
      state.mediaRequested = Boolean(state.currentCamera);

      els['selected-title'].textContent = `${ep.objName} - ${titleize(ep.hand)} - ${ep.rankLabel}`;
      els['selected-subtitle'].textContent = `${titleize(ep.scene)} scene ${ep.sceneInfo.slice(1).join(' / ')} | view ${state.currentCamera || 'none'} | ${ep.status}`;

      if (state.mediaRequested && state.currentCamera) {
        showVideo(videoUrl(ep, state.currentCamera), originalVideoUrl(ep, state.currentCamera));
      } else {
        showVideoPending('Video not loaded', 'Select an object, pose, or view to load the selected video.');
      }

      const model = modelUrl(ep);
      if (model) {
        showModel(model, cameraViewsUrl(ep));
      } else {
        showModelPending('Interactive 3D pending', 'No animated GLB is registered for this episode yet.');
      }
    }

    function renderViewRow() {
      const ep = currentEpisode();
      const cameras = ep?.cameras || [];
      els['view-count'].textContent = cameras.length ? `${cameras.length} views` : '0 views';
      if (!ep || !cameras.length) {
        els['view-strip'].innerHTML = '<div class="empty-inline">No camera streams listed for this episode.</div>';
        return;
      }
      els['view-strip'].innerHTML = cameras.map((cam, idx) =>
        `<button class="view-tile ${cam === state.currentCamera ? 'active' : ''}" data-camera="${escapeHtml(cam)}" title="${escapeHtml(cam)}">
          <img class="view-thumb" src="${viewThumbnailUrl(ep, cam)}" alt="" loading="lazy" decoding="async">
          <div class="tile-body">
            <div class="tile-title">View ${idx + 1}</div>
            <div class="tile-sub">${escapeHtml(cam)}</div>
          </div>
        </button>`
      ).join('');
      els['view-strip'].querySelectorAll('.view-tile').forEach((btn, idx) => {
        bindTileActivation(btn, () => {
          state.currentCamera = btn.dataset.camera;
          state.mediaRequested = true;
          renderMainPanel();
          renderSelectorRows();
          applySelectedCameraView({resetTime: true});
        });
        bindViewThumbnailFallback(btn, idx + 1);
      });
    }

    function bindViewThumbnailFallback(btn, viewNumber) {
      const img = btn.querySelector('img.view-thumb');
      if (!img) return;
      img.addEventListener('error', () => {
        const fallback = document.createElement('div');
        fallback.className = 'tile-preview view-preview';
        fallback.innerHTML = `<span>View ${viewNumber}</span>`;
        img.replaceWith(fallback);
      }, {once: true});
    }

    function showVideo(src, fallbackSrc = '') {
      bindSynchronizedPlaybackEvents();
      els['video-pending-layer'].classList.remove('visible');
      const video = els['main-video'];
      video.style.display = 'block';
      video.muted = true;
      video.autoplay = true;
      video.playbackRate = playbackSpeed();
      video.dataset.fallbackSrc = fallbackSrc || '';
      const tryPlay = () => video.play().catch(() => {});
      video.onerror = () => {
        const fallback = video.dataset.fallbackSrc;
        if (!fallback || video.getAttribute('src') === fallback) return;
        video.dataset.fallbackSrc = '';
        video.src = fallback;
        video.load();
        syncInteractive3DToVideo({force: true});
        tryPlay();
      };
      if (video.src !== src) {
        video.src = src;
        video.load();
      }
      syncInteractive3DToVideo({force: true});
      tryPlay();
      video.addEventListener('canplay', tryPlay, {once: true});
    }

    function showModel(src, cameraViewsSrc) {
      els['pending-layer'].classList.remove('visible');
      showInteractive3D(src, cameraViewsSrc);
    }

    function showVideoPending(title, copy) {
      els['main-video'].pause();
      els['main-video'].removeAttribute('src');
      els['main-video'].dataset.fallbackSrc = '';
      els['main-video'].onerror = null;
      els['main-video'].load();
      els['main-video'].style.display = 'none';
      els['video-pending-title'].textContent = title;
      els['video-pending-copy'].textContent = copy;
      els['video-pending-layer'].classList.add('visible');
    }

    function showModelPending(title, copy) {
      hideInteractive3D({clear: true});
      els['pending-title'].textContent = title;
      els['pending-copy'].textContent = copy;
      els['pending-layer'].classList.add('visible');
    }

    function clearMedia() {
      showVideoPending('No episode selected', 'Adjust filters to select an episode.');
      showModelPending('No episode selected', 'Adjust filters to select an episode.');
    }

    function renderSelectorRows() {
      updateSelectorHeaders();
      updateSelectorOpenState();
      renderObjectRow();
      renderPoseRow();
      renderViewRow();
    }

    function updateSelectorOpenState() {
      ['object', 'pose', 'view'].forEach(name => {
        const open = state.openSelector === name;
        els[`${name}-selector`].classList.toggle('open', open);
        els[`${name}-header`].setAttribute('aria-expanded', String(open));
      });
    }

    function updateSelectorHeaders() {
      const ep = currentEpisode();
      if (!ep) {
        els['object-value'].textContent = '-';
        els['pose-value'].textContent = '-';
        els['view-value'].textContent = '-';
        return;
      }
      const viewIndex = ep.cameras.indexOf(state.currentCamera);
      els['object-value'].textContent = ep.objName;
      els['pose-value'].textContent = `${ep.rankLabel} | ${titleize(ep.hand)} | ${ep.status}`;
      els['view-value'].textContent = viewIndex >= 0
        ? `View ${viewIndex + 1} | ${state.currentCamera}`
        : state.currentCamera || '-';
    }

    function renderObjectRow() {
      const f = filters();
      const episodes = state.episodes.filter(ep =>
        f.hands.has(ep.hand) &&
        f.statuses.has(ep.status) &&
        f.scenes.has(ep.scene)
      );
      const byObject = new Map();
      episodes.forEach(ep => {
        const item = byObject.get(ep.objId) || {id: ep.objId, name: ep.objName, episodes: 0, success: 0, fail: 0, first: ep, hasThumbnail: ep.hasThumbnail};
        item.episodes += 1;
        if (ep.status === 'success') item.success += 1;
        if (ep.status === 'fail') item.fail += 1;
        byObject.set(ep.objId, item);
      });
      const items = [...byObject.values()].sort((a, b) => a.name.localeCompare(b.name));
      els['object-count'].textContent = `${items.length} objects`;
      els['object-strip'].innerHTML = items.map(item => {
        const active = currentEpisode()?.objId === item.id;
        const thumb = item.hasThumbnail ? `objects/${item.id}/thumb.png?v=24` : '';
        return `<button class="object-tile ${active ? 'active' : ''}" data-object="${escapeHtml(item.id)}">
          ${thumb ? `<img src="${thumb}" alt="${escapeHtml(item.name)}" loading="eager">` : '<div class="empty-inline">No thumbnail</div>'}
          <div class="tile-body">
            <div class="tile-title">${escapeHtml(item.name)}</div>
            <div class="tile-sub">${item.episodes} episodes</div>
            <div class="status-line">
              <span class="chip ok">${item.success} success</span>
              <span class="chip warn">${item.fail} fail</span>
            </div>
          </div>
        </button>`;
      }).join('') || '<div class="empty-inline">No matching objects.</div>';
      els['object-strip'].querySelectorAll('.object-tile').forEach(btn => {
        bindTileActivation(btn, () => {
          const next = matchingObjectEpisode(btn.dataset.object) ||
            state.episodes.find(ep => ep.objId === btn.dataset.object);
          if (!next) return;
          state.currentKey = next.key;
          state.currentCamera = next.cameras[0] || null;
          state.mediaRequested = true;
          renderAll();
        });
      });
    }

    function matchingObjectEpisode(objId) {
      const f = filters();
      return state.episodes.find(ep =>
        ep.objId === objId &&
        f.hands.has(ep.hand) &&
        f.statuses.has(ep.status) &&
        f.scenes.has(ep.scene)
      );
    }

    function renderPoseRow() {
      const ep = currentEpisode();
      if (!ep) {
        els['pose-count'].textContent = '0 poses';
        els['pose-strip'].innerHTML = '<div class="empty-inline">No episode selected.</div>';
        return;
      }
      const f = filters();
      const poseItems = state.episodes.filter(item =>
          item.objId === ep.objId &&
          f.hands.has(item.hand) &&
          f.statuses.has(item.status) &&
          f.scenes.has(item.scene)
      ).slice(0, 48);
      els['pose-count'].textContent = `${poseItems.length} pose candidates`;
      els['pose-strip'].innerHTML = poseItems.map(item => {
        const active = item.key === state.currentKey;
        return `<button class="pose-tile ${active ? 'active' : ''}" data-key="${escapeHtml(item.key)}">
          <video src="${turntableUrl(item)}" muted loop playsinline preload="metadata"></video>
          <div class="tile-body">
            <div class="tile-title">${escapeHtml(item.rankLabel)}</div>
            <div class="tile-sub">${escapeHtml(titleize(item.hand))} | ${escapeHtml(titleize(item.scene))}</div>
            <div class="status-line">
              <span class="chip ${item.status === 'success' ? 'ok' : 'warn'}">${escapeHtml(item.status)}</span>
              <span class="chip">${item.cameras.length} views</span>
            </div>
          </div>
        </button>`;
      }).join('') || '<div class="empty-inline">No matching pose candidates.</div>';
      els['pose-strip'].querySelectorAll('.pose-tile').forEach(btn => {
        bindTileActivation(btn, () => {
          state.currentKey = btn.dataset.key;
          const next = currentEpisode();
          state.currentCamera = next?.cameras?.[0] || null;
          state.mediaRequested = true;
          renderAll();
        });
        const vid = btn.querySelector('video');
        btn.addEventListener('mouseenter', () => vid.play().catch(() => {}));
        btn.addEventListener('mouseleave', () => {
          vid.pause();
          vid.currentTime = 0;
        });
      });
    }

    function videoUrl(ep, camera) {
      if (!ep || !camera) return '';
      return `${PROXY_HF_BASE}/experiments/${ep.hand}/${ep.objId}/${ep.rankStr}/${camera}.mp4`;
    }

    function originalVideoUrl(ep, camera) {
      if (!ep || !camera) return '';
      return `${ORIGINAL_HF_BASE}/experiments/${ep.hand}/${ep.objId}/${ep.rankStr}/${camera}.mp4`;
    }

    function viewThumbnailUrl(ep, camera) {
      return `${PROXY_HF_BASE}/view_thumbnails/${ep.hand}/${ep.objId}/${ep.rankStr}/${camera}.webp`;
    }

    function turntableUrl(ep) {
      return `${ORIGINAL_HF_BASE}/turntable/${ep.hand}/${ep.objId}/${ep.rankStr}/turntable.mp4`;
    }

    function episode3DAsset(ep) {
      const objects = state.assets.objects || {};
      const entry = objects[ep.objId] || {};
      const recon = entry.reconstructions || entry.episodes || {};
      return recon[ep.key] || recon[ep.rankStr] || recon[ep.rank] || null;
    }

    function modelUrl(ep) {
      const objects = state.assets.objects || {};
      const entry = objects[ep.objId] || {};
      const episodeAsset = episode3DAsset(ep);
      const candidate = episodeAsset?.url || episodeAsset?.animated_glb || episodeAsset?.glb || episodeAsset?.gltf ||
        entry.url || entry.animated_glb || entry.glb || entry.gltf || '';
      return candidate ? resolveAssetUrl(candidate) : '';
    }

    function cameraViewsUrl(ep) {
      const objects = state.assets.objects || {};
      const entry = objects[ep.objId] || {};
      const episodeAsset = episode3DAsset(ep);
      const candidate = episodeAsset?.camera_views_json || entry.camera_views_json || '';
      return candidate ? resolveAssetUrl(candidate) : '';
    }

    function resolveAssetUrl(url) {
      if (!url) return '';
      if (/^https?:\/\//.test(url)) return url;
      const base = state.assets.base_url || '';
      return `${base}${url}`;
    }

    async function showInteractive3D(src, cameraViewsSrc = '') {
      const token = ++viewer3d.loadToken;
      els['interactive-3d-viewer'].style.display = 'block';
      setInteractive3DStatus('Loading interactive 3D...');
      try {
        await ensureInteractive3D();
        if (token !== viewer3d.loadToken) return;
        await Promise.all([
          loadInteractive3DModel(src, token),
          loadInteractive3DCameraViews(cameraViewsSrc, token)
        ]);
        if (token !== viewer3d.loadToken) return;
        applySelectedCameraView();
      } catch (error) {
        if (token !== viewer3d.loadToken) return;
        console.error(error);
        setInteractive3DStatus(`Interactive 3D failed: ${error.message || error}`);
      }
    }

    function hideInteractive3D({clear = false} = {}) {
      if (clear) viewer3d.loadToken += 1;
      els['interactive-3d-viewer'].style.display = 'none';
      viewer3d.playing = false;
      updateInteractivePlayButton();
      if (clear) clearInteractive3DModel();
    }

    function setInteractive3DStatus(message) {
      els['interactive-3d-status'].textContent = message;
    }

    async function ensureInteractive3D() {
      if (viewer3d.initialized) {
        resizeInteractive3D();
        return;
      }
      if (viewer3d.loading) return viewer3d.loading;
      viewer3d.loading = (async () => {
        const [threeModule, controlsModule, loaderModule] = await Promise.all([
          import(THREE_MODULE_URL),
          import(ORBIT_CONTROLS_URL),
          import(GLTF_LOADER_URL)
        ]);
        viewer3d.THREE = threeModule;
        viewer3d.OrbitControls = controlsModule.OrbitControls;
        viewer3d.GLTFLoader = loaderModule.GLTFLoader;
        viewer3d.clock = new viewer3d.THREE.Clock();

        viewer3d.scene = new viewer3d.THREE.Scene();
        viewer3d.scene.background = new viewer3d.THREE.Color(0xf7f8f4);
        viewer3d.camera = new viewer3d.THREE.PerspectiveCamera(45, 1, 0.001, 20);
        viewer3d.camera.up.set(0, 0, 1);
        viewer3d.assetRoot = new viewer3d.THREE.Group();
        viewer3d.scene.add(viewer3d.assetRoot);
        viewer3d.renderer = new viewer3d.THREE.WebGLRenderer({antialias: true, alpha: false});
        viewer3d.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        viewer3d.renderer.outputColorSpace = viewer3d.THREE.SRGBColorSpace;
        viewer3d.renderer.toneMapping = viewer3d.THREE.ACESFilmicToneMapping;
        viewer3d.renderer.toneMappingExposure = 0.95;
        els['interactive-3d-canvas'].appendChild(viewer3d.renderer.domElement);

        viewer3d.controls = new viewer3d.OrbitControls(viewer3d.camera, viewer3d.renderer.domElement);
        viewer3d.controls.enableDamping = true;
        viewer3d.controls.screenSpacePanning = true;
        viewer3d.scene.add(new viewer3d.THREE.HemisphereLight(0xffffff, 0x9fa69e, 1.8));
        const key = new viewer3d.THREE.DirectionalLight(0xffffff, 2.2);
        key.position.set(1.1, -1.2, 1.8);
        viewer3d.scene.add(key);
        const fill = new viewer3d.THREE.DirectionalLight(0xffffff, 0.8);
        fill.position.set(-0.8, 0.9, 1.0);
        viewer3d.scene.add(fill);
        addInteractiveGrid();
        bindSynchronizedPlaybackEvents();

        els['interactive-3d-play'].addEventListener('click', () => {
          toggleSynchronizedPlayback();
        });
        els['interactive-3d-scrub'].addEventListener('input', () => {
          const t = (Number(els['interactive-3d-scrub'].value) || 0) / 1000;
          seekSynchronizedPlayback(t);
        });
        els['interactive-3d-speed'].addEventListener('change', () => {
          const video = els['main-video'];
          const speed = playbackSpeed();
          if (video) video.playbackRate = speed;
          viewer3d.clock.getDelta();
          syncInteractive3DToVideo({force: true});
        });

        viewer3d.resizeObserver = new ResizeObserver(resizeInteractive3D);
        viewer3d.resizeObserver.observe(els['interactive-3d-viewer']);
        window.addEventListener('resize', resizeInteractive3D);
        viewer3d.initialized = true;
        resizeInteractive3D();
        animateInteractive3D();
      })();
      return viewer3d.loading;
    }

    function addInteractiveGrid(size = 1.2, divisions = 24) {
      const THREE = viewer3d.THREE;
      const group = new THREE.Group();
      const material = new THREE.LineBasicMaterial({color: 0xc7cdc3, transparent: true, opacity: 0.58});
      const half = size / 2;
      const step = size / divisions;
      for (let i = 0; i <= divisions; i += 1) {
        const v = -half + i * step;
        group.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-half, v, 0), new THREE.Vector3(half, v, 0)]),
          material
        ));
        group.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(v, -half, 0), new THREE.Vector3(v, half, 0)]),
          material
        ));
      }
      viewer3d.scene.add(group);
      viewer3d.scene.add(new THREE.AxesHelper(0.18));
    }

    function resizeInteractive3D() {
      if (!viewer3d.renderer || !viewer3d.camera) return;
      const rect = els['interactive-3d-viewer'].getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      viewer3d.camera.aspect = rect.width / rect.height;
      viewer3d.camera.updateProjectionMatrix();
      viewer3d.renderer.setSize(rect.width, rect.height, false);
    }

    async function loadInteractive3DModel(src, token) {
      if (viewer3d.currentSrc === src && viewer3d.model) {
        viewer3d.playing = true;
        updateInteractivePlayButton();
        setInteractive3DStatus('Interactive 3D');
        return;
      }
      clearInteractive3DModel();
      viewer3d.currentSrc = src;
      setInteractive3DStatus('Fetching animated GLB...');
      const loader = new viewer3d.GLTFLoader();
      const gltf = await new Promise((resolve, reject) => {
        loader.load(src, resolve, event => {
          if (event.lengthComputable && event.total > 0) {
            const pct = Math.max(0, Math.min(100, event.loaded / event.total * 100));
            setInteractive3DStatus(`Loading animated GLB... ${pct.toFixed(0)}%`);
          }
        }, reject);
      });
      if (token !== viewer3d.loadToken || viewer3d.currentSrc !== src) {
        disposeObject3D(gltf.scene);
        return;
      }
      viewer3d.model = gltf.scene;
      viewer3d.assetRoot.add(viewer3d.model);
      if (!gltf.animations?.length) {
        setInteractive3DStatus('Loaded GLB has no animation clip');
      } else {
        viewer3d.mixer = new viewer3d.THREE.AnimationMixer(viewer3d.model);
        viewer3d.duration = Math.max(...gltf.animations.map(clip => clip.duration || 0));
        gltf.animations.forEach(clip => {
          const action = viewer3d.mixer.clipAction(clip);
          action.reset();
          action.setLoop(viewer3d.THREE.LoopRepeat, Infinity);
          action.play();
        });
        els['interactive-3d-scrub'].max = String(Math.max(1, Math.round(viewer3d.duration * 1000)));
        viewer3d.playing = true;
        updateInteractivePlayButton();
        setInteractive3DTime(0);
        syncInteractive3DToVideo({force: true});
        setInteractive3DStatus(`Interactive 3D | ${gltf.animations.length} animation clip | ${viewer3d.duration.toFixed(2)}s`);
      }
      applySelectedCameraView();
      viewer3d.renderer.render(viewer3d.scene, viewer3d.camera);
    }

    async function loadInteractive3DCameraViews(src, token) {
      if (!src) {
        viewer3d.cameraViews = null;
        viewer3d.currentCameraViewsSrc = '';
        return;
      }
      if (viewer3d.currentCameraViewsSrc === src && viewer3d.cameraViews) return;
      if (viewer3d.cameraViewsCache.has(src)) {
        viewer3d.cameraViews = viewer3d.cameraViewsCache.get(src);
        viewer3d.currentCameraViewsSrc = src;
        return;
      }
      const payload = await fetch(src).then(r => {
        if (!r.ok) throw new Error(`camera_views fetch failed: ${r.status}`);
        return r.json();
      });
      if (token !== viewer3d.loadToken) return;
      viewer3d.cameraViewsCache.set(src, payload);
      viewer3d.cameraViews = payload;
      viewer3d.currentCameraViewsSrc = src;
    }

    function clearInteractive3DModel() {
      viewer3d.mixer?.stopAllAction?.();
      if (viewer3d.assetRoot) {
        [...viewer3d.assetRoot.children].forEach(child => {
          viewer3d.assetRoot.remove(child);
          disposeObject3D(child);
        });
      } else if (viewer3d.model && viewer3d.scene) {
        viewer3d.scene.remove(viewer3d.model);
        disposeObject3D(viewer3d.model);
      }
      viewer3d.model = null;
      viewer3d.mixer = null;
      viewer3d.duration = 0;
      viewer3d.currentSrc = '';
      els['interactive-3d-scrub'].value = '0';
      els['interactive-3d-readout'].textContent = '0.00s';
    }

    function disposeObject3D(root) {
      root?.traverse?.(node => {
        node.geometry?.dispose?.();
        const materials = Array.isArray(node.material) ? node.material : [node.material].filter(Boolean);
        materials.forEach(material => material.dispose?.());
      });
    }

    function fitInteractiveCamera(root) {
      const THREE = viewer3d.THREE;
      root.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z, 0.25);
      viewer3d.camera.up.set(0, 0, 1);
      viewer3d.camera.fov = 45;
      viewer3d.camera.position.set(center.x + radius * 1.0, center.y - radius * 1.35, center.z + radius * 0.75);
      viewer3d.camera.updateProjectionMatrix();
      viewer3d.controls.target.copy(center);
      viewer3d.controls.update();
    }

    function resetInteractive3DView({resetTime = false} = {}) {
      if (!viewer3d.model || !viewer3d.controls || !viewer3d.camera) return;
      if (resetTime && viewer3d.mixer) {
        setInteractive3DTime(0);
      }
      fitInteractiveCamera(viewer3d.model);
      viewer3d.clock?.getDelta?.();
      viewer3d.renderer?.render(viewer3d.scene, viewer3d.camera);
    }

    function applySelectedCameraView({resetTime = false} = {}) {
      if (!viewer3d.model || !viewer3d.controls || !viewer3d.camera) return false;
      const view = viewer3d.cameraViews?.views?.[state.currentCamera];
      if (!view?.three) {
        resetInteractive3DView({resetTime});
        return false;
      }
      if (resetTime && viewer3d.mixer) {
        setInteractive3DTime(0);
      }

      const THREE = viewer3d.THREE;
      const pos = vectorFromArray(view.three.position);
      const forward = vectorFromArray(view.three.forward).normalize();
      const up = vectorFromArray(view.three.up).normalize();
      const bounds = modelBounds(viewer3d.model);
      const toCenter = bounds.center.clone().sub(pos);
      let focusDistance = toCenter.dot(forward);
      if (!Number.isFinite(focusDistance) || focusDistance <= bounds.radius * 0.25) {
        focusDistance = Math.max(bounds.radius * 2.5, toCenter.length());
      }
      const target = pos.clone().add(forward.multiplyScalar(focusDistance));

      viewer3d.camera.up.copy(up);
      viewer3d.camera.position.copy(pos);
      viewer3d.camera.fov = Number(view.three.fov_y_deg) || 45;
      viewer3d.camera.near = 0.001;
      viewer3d.camera.far = Math.max(20, focusDistance + bounds.radius * 4);
      viewer3d.camera.updateProjectionMatrix();
      viewer3d.controls.target.copy(target);
      viewer3d.controls.update();
      viewer3d.clock?.getDelta?.();
      viewer3d.renderer?.render(viewer3d.scene, viewer3d.camera);
      setInteractive3DStatus(`Interactive 3D | view ${state.currentCamera}`);
      return true;
    }

    function vectorFromArray(values) {
      const THREE = viewer3d.THREE;
      return new THREE.Vector3(
        Number(values?.[0]) || 0,
        Number(values?.[1]) || 0,
        Number(values?.[2]) || 0
      );
    }

    function modelBounds(root) {
      const THREE = viewer3d.THREE;
      root.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      return {
        center,
        radius: Math.max(size.x, size.y, size.z, 0.25)
      };
    }

    function bindSynchronizedPlaybackEvents() {
      if (viewer3d.syncEventsBound) return;
      const video = els['main-video'];
      if (!video) return;
      viewer3d.syncEventsBound = true;

      video.addEventListener('play', () => {
        viewer3d.playing = true;
        viewer3d.clock?.getDelta?.();
        syncInteractive3DToVideo({force: true});
        updateInteractivePlayButton();
      });
      video.addEventListener('pause', () => {
        viewer3d.playing = false;
        syncInteractive3DToVideo({force: true});
        updateInteractivePlayButton();
      });
      video.addEventListener('ended', () => {
        viewer3d.playing = false;
        syncInteractive3DToVideo({force: true});
        updateInteractivePlayButton();
      });
      video.addEventListener('emptied', () => {
        viewer3d.playing = false;
        updateInteractivePlayButton();
      });
      ['loadedmetadata', 'canplay', 'seeking', 'seeked', 'timeupdate', 'waiting', 'stalled', 'ratechange'].forEach(eventName => {
        video.addEventListener(eventName, () => syncInteractive3DToVideo({force: true}));
      });
    }

    function playbackSpeed() {
      return Number(els['interactive-3d-speed'].value) || 1;
    }

    function hasVideoSource(video = els['main-video']) {
      return Boolean(video?.getAttribute('src')) && getComputedStyle(video).display !== 'none';
    }

    function shouldSyncInteractive3DToVideo() {
      return Boolean(viewer3d.mixer && viewer3d.duration && hasVideoSource());
    }

    function videoSyncedTime(video = els['main-video']) {
      const raw = Number.isFinite(video?.currentTime) ? video.currentTime : 0;
      if (!viewer3d.duration) return Math.max(0, raw);
      return ((raw % viewer3d.duration) + viewer3d.duration) % viewer3d.duration;
    }

    function syncInteractive3DToVideo({force = false, render = true} = {}) {
      if (!shouldSyncInteractive3DToVideo()) return false;
      const video = els['main-video'];
      const target = videoSyncedTime(video);
      const current = ((viewer3d.mixer.time % viewer3d.duration) + viewer3d.duration) % viewer3d.duration;
      const videoAdvancing = !video.paused && !video.ended;
      if (force || videoAdvancing || video.seeking || Math.abs(current - target) > 0.025) {
        setInteractive3DTime(target, {render});
      }
      viewer3d.playing = videoAdvancing;
      updateInteractivePlayButton();
      return true;
    }

    function toggleSynchronizedPlayback() {
      const video = els['main-video'];
      if (hasVideoSource(video)) {
        if (video.paused || video.ended) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
        syncInteractive3DToVideo({force: true});
        return;
      }

      viewer3d.playing = !viewer3d.playing;
      viewer3d.clock?.getDelta?.();
      updateInteractivePlayButton();
    }

    function seekSynchronizedPlayback(timeSec) {
      const video = els['main-video'];
      if (hasVideoSource(video) && Number.isFinite(video.duration) && video.duration > 0) {
        const maxTime = Math.max(0, video.duration - 0.001);
        video.currentTime = Math.max(0, Math.min(timeSec, maxTime));
      }
      setInteractive3DTime(timeSec);
      syncInteractive3DToVideo({force: true});
    }

    function setInteractive3DTime(timeSec, {render = true} = {}) {
      if (!viewer3d.mixer) return;
      const t = Math.max(0, Math.min(timeSec, viewer3d.duration || timeSec));
      viewer3d.mixer.setTime(t);
      viewer3d.model?.updateMatrixWorld(true);
      els['interactive-3d-scrub'].value = String(Math.round(t * 1000));
      els['interactive-3d-readout'].textContent = `${t.toFixed(2)}s`;
      if (render) viewer3d.renderer?.render(viewer3d.scene, viewer3d.camera);
    }

    function updateInteractivePlayButton() {
      const video = els['main-video'];
      const playing = hasVideoSource(video) ? !video.paused && !video.ended : viewer3d.playing;
      els['interactive-3d-play'].textContent = playing ? 'Pause' : 'Play';
    }

    function animateInteractive3D() {
      viewer3d.frame = requestAnimationFrame(animateInteractive3D);
      const delta = viewer3d.clock?.getDelta?.() || 0;
      const synced = syncInteractive3DToVideo({render: false});
      if (!synced && viewer3d.mixer && viewer3d.playing && els['interactive-3d-viewer'].style.display !== 'none') {
        const speed = playbackSpeed();
        viewer3d.mixer.update(delta * speed);
        if (viewer3d.duration) {
          const t = viewer3d.mixer.time % viewer3d.duration;
          els['interactive-3d-scrub'].value = String(Math.round(t * 1000));
          els['interactive-3d-readout'].textContent = `${t.toFixed(2)}s`;
        }
      }
      viewer3d.controls?.update();
      viewer3d.renderer?.render(viewer3d.scene, viewer3d.camera);
    }

    function padRank(rank) {
      return String(rank).padStart(3, '0');
    }

    function titleize(value) {
      return String(value || '')
        .replace(/_/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
