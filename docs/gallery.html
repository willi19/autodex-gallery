<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - AutoDex</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html">AutoDex</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="experiments.html">Experiments</a>
  </nav>

  <div class="container">
    <input type="text" class="search-bar" id="search" placeholder="Search objects...">
    <div class="stats-bar" id="stats"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const HF_BASE = 'https://huggingface.co/datasets/willi19/autodex-gallery/resolve/main';
    let catalog = [];

    fetch('catalog.json')
      .then(r => r.json())
      .then(data => {
        catalog = data;
        render(catalog);
        updateStats(catalog);
      });

    function updateStats(items) {
      const allegro = items.filter(o => o.hands.allegro).length;
      const inspire = items.filter(o => o.hands.inspire).length;
      document.getElementById('stats').textContent =
        `${items.length} objects | ${allegro} with Allegro | ${inspire} with Inspire`;
    }

    function render(items) {
      const grid = document.getElementById('grid');
      grid.innerHTML = items.map(obj => {
        const thumbSrc = obj.has_thumbnail
          ? `objects/${obj.id}/thumb.png`
          : `https://via.placeholder.com/256/1a1f26/8b949e?text=${obj.id}`;
        const hands = Object.keys(obj.hands).join(', ');
        return `
          <div class="grid-item" onclick="location.href='object.html?obj=${obj.id}'">
            <img src="${thumbSrc}" alt="${obj.name}" loading="lazy">
            <div class="label">${obj.name}</div>
            <div class="hands-info">${hands}</div>
          </div>`;
      }).join('');
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = catalog.filter(o =>
        o.id.includes(q) || o.name.toLowerCase().includes(q)
      );
      render(filtered);
      updateStats(filtered);
    });
  </script>
</body>
</html>
