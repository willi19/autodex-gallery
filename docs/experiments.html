<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiments - AutoDex</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .exp-summary {
      display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .exp-stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 24px; text-align: center;
    }
    .exp-stat-card .num { font-size: 2em; font-weight: 700; }
    .exp-stat-card .label { color: var(--text-muted); font-size: 0.85em; }
    .exp-stat-card .num.green { color: var(--green); }
    .exp-stat-card .num.red { color: #f85149; }

    .exp-table {
      width: 100%; border-collapse: collapse; margin-top: 8px;
    }
    .exp-table th, .exp-table td {
      padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .exp-table th { color: var(--text-muted); font-size: 0.85em; font-weight: 600; }
    .exp-table tr { cursor: pointer; transition: background 0.15s; }
    .exp-table tr:hover { background: var(--surface); }
    .bar-bg {
      width: 120px; height: 8px; background: #f85149; border-radius: 4px; overflow: hidden; display: inline-block;
    }
    .bar-fill { height: 100%; background: var(--green); border-radius: 4px; }

    .hand-filter { display: flex; gap: 0; margin-bottom: 16px; }
    .hand-filter button {
      padding: 8px 20px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer; font-size: 0.9em;
    }
    .hand-filter button:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .hand-filter button:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
    .hand-filter button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html">AutoDex</a>
    <a href="gallery.html">Gallery</a>
    <a href="experiments.html" class="active">Experiments</a>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 16px;">Experiments</h1>

    <div class="hand-filter" id="hand-filter"></div>
    <div class="exp-summary" id="summary"></div>
    <table class="exp-table">
      <thead>
        <tr><th>Object</th><th>Grasps Tested</th><th>Success</th><th>Fail</th><th>Rate</th><th></th></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
    let experiments = {};
    let currentHand = 'allegro';

    fetch('experiments.json').then(r => r.json()).then(data => {
      experiments = data;
      renderHandFilter();
      render();
    });

    function renderHandFilter() {
      const el = document.getElementById('hand-filter');
      el.innerHTML = ['allegro', 'inspire'].map(h =>
        `<button class="${h === currentHand ? 'active' : ''}" data-hand="${h}">${h.charAt(0).toUpperCase() + h.slice(1)}</button>`
      ).join('');
      el.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentHand = btn.dataset.hand;
          renderHandFilter();
          render();
        });
      });
    }

    function render() {
      const handData = experiments[currentHand] || {};
      const objects = Object.keys(handData).sort();

      let totalTested = 0, totalSuccess = 0, totalFail = 0;
      const rows = [];

      for (const obj of objects) {
        const grasps = Object.values(handData[obj]);
        const tested = grasps.length;
        const succ = grasps.filter(g => g.status === 'success').length;
        const fail = tested - succ;
        const rate = tested > 0 ? (succ / tested * 100).toFixed(0) : 0;
        totalTested += tested;
        totalSuccess += succ;
        totalFail += fail;
        rows.push({ obj, tested, succ, fail, rate });
      }

      document.getElementById('summary').innerHTML = `
        <div class="exp-stat-card"><div class="num">${objects.length}</div><div class="label">Objects</div></div>
        <div class="exp-stat-card"><div class="num">${totalTested}</div><div class="label">Grasps Tested</div></div>
        <div class="exp-stat-card"><div class="num green">${totalSuccess}</div><div class="label">Success</div></div>
        <div class="exp-stat-card"><div class="num red">${totalFail}</div><div class="label">Fail</div></div>
        <div class="exp-stat-card"><div class="num">${totalTested > 0 ? (totalSuccess/totalTested*100).toFixed(0) : 0}%</div><div class="label">Success Rate</div></div>
      `;

      document.getElementById('table-body').innerHTML = rows.map(r => `
        <tr onclick="location.href='object.html?obj=${r.obj}&hand=${currentHand}&view=experiments'">
          <td>${r.obj.replace(/_/g, ' ')}</td>
          <td>${r.tested}</td>
          <td style="color:var(--green)">${r.succ}</td>
          <td style="color:#f85149">${r.fail}</td>
          <td>
            <div class="bar-bg"><div class="bar-fill" style="width:${r.rate}%"></div></div>
            ${r.rate}%
          </td>
          <td>&rarr;</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
